name: Publish to npm

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish --dry-run instead of publishing"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish-main
  cancel-in-progress: false

jobs:
  publish:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Auto-bump patch version
        if: github.event_name == 'workflow_run'
        id: bump
        shell: bash
        run: |
          npm version patch --no-git-tag-version
          bun install
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Auto-bumped package version to ${VERSION}"

      - name: Read package version
        id: package-version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Ensure version is not already published
        if: github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')
        shell: bash
        run: |
          VERSION="${{ steps.package-version.outputs.version }}"
          if npm view "varsity@${VERSION}" version >/dev/null 2>&1; then
            echo "varsity@${VERSION} is already published on npm."
            exit 1
          fi

      - name: Build
        run: bun run build

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Commit version bump
        if: github.event_name == 'workflow_run'
        shell: bash
        run: |
          VERSION="${{ steps.package-version.outputs.version }}"
          TAG="${{ steps.package-version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json bun.lock
          git commit -m "chore: release ${TAG} [skip ci]"
          git push origin HEAD:main

      - name: Create and push tag
        if: github.event_name == 'workflow_run'
        shell: bash
        run: |
          TAG="${{ steps.package-version.outputs.tag }}"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Publish dry run
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        run: npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: github.event_name == 'workflow_run'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package-version.outputs.tag }}
          name: ${{ steps.package-version.outputs.tag }}
          generate_release_notes: true
